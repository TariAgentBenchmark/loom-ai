<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LoomAI</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #111827;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(460px, calc(100vw - 48px));
        padding: 32px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 20px;
        color: #4b5563;
        line-height: 1.6;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 6px;
        background: #111827;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        padding: 10px 16px;
      }

      button:focus-visible {
        outline: 3px solid #93c5fd;
        outline-offset: 2px;
      }

      code {
        display: block;
        margin-top: 16px;
        padding: 12px;
        border-radius: 6px;
        background: #f3f4f6;
        color: #374151;
        font-size: 12px;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>LoomAI could not be loaded</h1>
      <p>
        Check your network connection or confirm that the configured LoomAI web
        address is available.
      </p>
      <button type="button" id="retry">Retry</button>
      <code id="details"></code>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const target = params.get("target") || "https://tuyunai.cn";
      const failed = params.get("failed") || target;
      const message = params.get("message") || "Load failed";

      document.getElementById("details").textContent =
        message + "\n" + failed;
      document.getElementById("retry").addEventListener("click", () => {
        window.location.href = target;
      });
    </script>
  </body>
</html>
